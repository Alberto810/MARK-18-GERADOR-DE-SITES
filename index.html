<!DOCTYPE html> <!-- VERSÃO DO HTML (MAIS NOVA)-->

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Sites</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/gerador-sites/favicon.ico" type="image/x-icon">
</head>

<body>

    <p class="gerar">Gerador de Sites com Inteligência Artificial ⚡</p>

    <h1>Crie sua Página <span>com um prompt</span></h1>

    <p class="descricao">Descreva o seu negócio e veja a IA criar uma página profissional em segundos.</p>

    <div class="entrada">
        <textarea class="caixa-texto" placeholder="Descreva a sua ideia..."></textarea>
        <button class="botao-gerar">Gerar⚡</button>
    </div>

    <div class="resultado">

        <p class="bloco-codigo"></p>

        <div class="codigo">
            <iframe class="resultado-codigo"></iframe>
        </div>


</body>
